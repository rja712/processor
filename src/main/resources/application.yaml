server:
  port: 8081

spring:
  application:
    name: processor

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        default-requeue-rejected: false
    email-event:
      exchange: ${RABBITMQ_EMAIL_EVENT_EXCHANGE}
      sanitization-queue: ${RABBITMQ_EMAIL_SANITIZATION_QUEUE}
      sanitization-routing-key: ${RABBITMQ_EMAIL_SANITIZATION_ROUTING_KEY}
      embedding-queue: ${RABBITMQ_EMAIL_EMBEDDING_QUEUE}
      embedding-routing-key: ${RABBITMQ_EMAIL_EMBEDDING_ROUTING_KEY}

email-storage-provider:
  name: ${EMAIL_STORAGE_PROVIDER_NAME}
  local-base-path: ${EMAIL_STORAGE_LOCAL_BASE_PATH}

embedding-provider:
  name: ${EMBEDDING_PROVIDER_NAME}
  ollama-url: ${EMBEDDING_OLLAMA_URL}
  model: ${EMBEDDING_MODEL}
  num-ctx: 8192
  max-chars: 30000

sanitization:
  quoted-text-patterns:
    - "(?m)^On .{10,80}<[^>]+>\\s*wrote:\\s*$"
    - "(?m)^On .{10,80} wrote:\\s*$"
    - "(?m)^-{3,}\\s*Original Message\\s*-{3,}"
    - "(?ms)^From:\\s.*\\nSent:\\s.*\\nTo:\\s.*"
    - "(?m)^_{3,}\\s*$"
  signature-patterns:
    - "^-- ?$"
    - "(?i)^Sent from my (iPhone|iPad|Galaxy|Samsung)"
    - "(?i)^Sent from Mail for Windows"
    - "(?i)^Get Outlook for (iOS|Android)"
    - "(?i)^Sent from Yahoo Mail"
  sign-off-phrases:
    - "best regards"
    - "kind regards"
    - "warm regards"
    - "regards"
    - "thanks"
    - "thank you"
    - "cheers"
    - "sincerely"
    - "respectfully"
    - "best"
  disclaimer-keywords:
    - "confidential"
    - "privileged"
    - "intended recipient"
    - "unauthorized"
    - "disclaimer"
    - "this email"
    - "this message"
    - "please notify"
    - "delete this"
    - "legally privileged"

logging:
  level:
    com.inboxintelligence.processor: DEBUG
    org.springframework.amqp: INFO
