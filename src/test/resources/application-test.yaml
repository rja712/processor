spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
    email-event:
      exchange: test-exchange
      sanitization-queue: test-sanitization-queue
      sanitization-routing-key: test.sanitization.key
      embedding-queue: test-embedding-queue
      embedding-routing-key: test.embedding.key

email-storage-provider:
  name: LOCAL
  local-base-path: /tmp/processor-test-data

embedding-provider:
  name: ollama
  ollama-url: http://localhost:11434/api/embeddings
  model: test-model
